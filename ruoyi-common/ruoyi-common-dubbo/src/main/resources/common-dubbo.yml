# 内置配置 不允许修改 如需修改请在 nacos 上写相同配置覆盖
dubbo:
  application:
    logger: slf4j
    # 元数据中心 这里使用远程便于其他服务获取
    metadataType: remote
    # 可选值 interface、instance、all，默认是 all，即接口级地址、应用级地址都注册
    register-mode: instance
  # 注册中心配置
  registry:
    address: nacos://${spring.cloud.nacos.server-addr}
    group: DUBBO_GROUP
    username: ${spring.cloud.nacos.username}
    password: ${spring.cloud.nacos.password}
    parameters:
      namespace: ${spring.cloud.nacos.discovery.namespace:public}
    # 远程配置中心 true 开启 false 关闭 (一般情况不用开启)
    use-as-config-center: false
  # 已经采用框架内 Redisson 实现元数据中心
  # 以下配置不用管占位用 不然 dubbo 会直接用 nacos 当注册中心 直接配好框架自带的 Redisson 即可
  metadata-report:
    address: redis://${spring.data.redis.host:localhost}:${spring.data.redis.port:6379}
    group: DUBBO_GROUP
    username: ${spring.data.redis.username:default}
    password: ${spring.data.redis.password}
    parameters:
      namespace: ${spring.profiles.active}
      database: ${spring.data.redis.database}
      timeout: ${spring.data.redis.timeout}
  # 消费者相关配置
  consumer:
    # 结果缓存(LRU算法)
    # 会有数据不一致问题 建议在注解局部开启
    cache: false
    # 支持校验注解
    validation: jvalidationNew
    # 调用重试 不包括第一次 0为不需要重试
    retries: 0
    # 初始化检查
    check: false
